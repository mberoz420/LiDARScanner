workflows:
  # Quick testing workflow - installs directly on device
  ios-adhoc:
    name: iOS Ad-Hoc (Quick Test)
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true

    environment:
      vars:
        XCODE_SCHEME: "LiDARScanner"
        BUNDLE_ID: "com.lidarscanner.LiDarScanner"
        TEAM_ID: "J4FK2D7585"
      groups:
        - App_Store
      xcode: latest

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Set up signing
        script: |
          keychain initialize

          # Save API key to file and clean up whitespace
          mkdir -p ~/.private_keys
          printf '%s\n' "$APP_STORE_CONNECT_PRIVATE_KEY" | tr -d '\r' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//' > ~/.private_keys/AuthKey.p8

          # Use stored certificate key (consistent across builds)
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > ~/.private_keys/cert_key.pem

          # Fetch signing files for ad-hoc
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@file:$HOME/.private_keys/AuthKey.p8" \
            --certificate-key "@file:$HOME/.private_keys/cert_key.pem" \
            --create

          keychain add-certificates
          xcode-project use-profiles

      - name: Increment build number
        script: |
          BUILD_NUMBER=$(($(date +%s)/60))
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all $BUILD_NUMBER || true

      - name: Build Core ML model
        script: |
          echo "Converting PyTorch model to Core ML..."
          cd ML/pretrained || exit 0
          if [ -f "IndoorSegmentation.pt" ]; then
            pip3 install torch coremltools numpy || echo "Warning: pip install failed"
            python3 convert_on_mac.py || echo "Warning: Core ML conversion failed"
            if [ -d "IndoorSegmentation.mlpackage" ]; then
              mkdir -p ../../LiDARScanner/ML
              cp -r IndoorSegmentation.mlpackage ../../LiDARScanner/ML/
              echo "Core ML model created and copied to LiDARScanner/ML/"
            fi
          else
            echo "No PyTorch checkpoint found, skipping Core ML conversion"
          fi
          # Always succeed - ML model is optional
          exit 0

      - name: Build archive
        script: |
          echo "Building archive..."
          mkdir -p build

          # Build with error logging - capture both stdout and stderr
          xcodebuild archive \
            -project "LiDARScanner.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/LiDARScanner.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            -allowProvisioningUpdates \
            2>&1 | tee build.log

          BUILD_STATUS=${PIPESTATUS[0]}

          # Save build status for error log
          echo "BUILD_EXIT_CODE=$BUILD_STATUS" >> $CM_ENV

          # If build failed, extract and save errors
          if [ $BUILD_STATUS -ne 0 ]; then
            echo ""
            echo "=========================================="
            echo "BUILD FAILED - Compilation Errors:"
            echo "=========================================="

            # Extract error lines
            grep -E "error:|warning:" build.log > build_errors.txt || true
            grep -B2 -A2 "error:" build.log > build_errors_context.txt || true

            # Show errors in log
            cat build_errors.txt
            echo ""
            echo "=========================================="
            echo "Full error context (last 100 lines):"
            echo "=========================================="
            tail -100 build.log

            # Save errors to environment for later upload
            ERRORS=$(cat build_errors.txt | head -50 | sed 's/"/\\"/g' | tr '\n' '|')
            echo "BUILD_ERRORS=$ERRORS" >> $CM_ENV
          fi

          echo "Archive result:"
          ls -la "$CM_BUILD_DIR/build/" || echo "Build folder not found"
          ls -la "$CM_BUILD_DIR/build/LiDARScanner.xcarchive" || echo "Archive not found"

          # Don't exit yet - let the status upload run first

      - name: Upload build status
        script: |
          REPO="${VERSION_JSON_REPO:-mberoz420/LiDARScanner}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1 | sed 's/"/\\"/g')

          # Determine status
          if [ "${BUILD_EXIT_CODE:-0}" -eq 0 ]; then
            STATUS="success"
            ERRORS_JSON="[]"
          else
            STATUS="failed"
            # Parse errors into JSON array using sed/awk
            if [ -f build_errors.txt ]; then
              ERRORS_JSON=$(cat build_errors.txt | head -30 | sed 's/\\/\\\\/g; s/"/\\"/g' | awk 'BEGIN{printf "["} NR>1{printf ","} {printf "\"%s\"", $0} END{printf "]"}')
              [ -z "$ERRORS_JSON" ] && ERRORS_JSON="[]"
            else
              ERRORS_JSON="[\"Build failed - no error details captured\"]"
            fi
          fi

          # Create build_status.json
          cat > build_status.json << EOF
          {
            "status": "$STATUS",
            "timestamp": "$TIMESTAMP",
            "commit": "$COMMIT_SHA",
            "commit_message": "$COMMIT_MSG",
            "build_number": "${BUILD_NUMBER:-0}",
            "version": "${MARKETING_VERSION:-unknown}",
            "errors": $ERRORS_JSON,
            "workflow": "ios-adhoc",
            "duration_seconds": ${CM_BUILD_STEP_DURATION:-0}
          }
          EOF

          echo "Build status:"
          cat build_status.json

          # Upload to GitHub
          if [ -n "$GITHUB_TOKEN" ]; then
            echo "Uploading build_status.json to GitHub..."
            CONTENT_BASE64=$(base64 -i build_status.json | tr -d '\n')

            SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/contents/build_status.json" \
              | python3 -c "import sys, json; print(json.load(sys.stdin).get('sha', ''))" 2>/dev/null || echo "")

            if [ -n "$SHA" ]; then
              PAYLOAD="{\"message\":\"Build $STATUS: $COMMIT_MSG\",\"content\":\"$CONTENT_BASE64\",\"sha\":\"$SHA\"}"
            else
              PAYLOAD="{\"message\":\"Build $STATUS: $COMMIT_MSG\",\"content\":\"$CONTENT_BASE64\"}"
            fi

            curl -s -X PUT -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://api.github.com/repos/$REPO/contents/build_status.json" > /dev/null

            echo "build_status.json uploaded to GitHub"
          fi

          # Fail only if the archive was not actually created
          if [ ! -d "$CM_BUILD_DIR/build/LiDARScanner.xcarchive" ]; then
            echo "Archive not found — build failed"
            exit 1
          fi
          echo "Archive exists — proceeding with export"

      # Note: export options are auto-generated by xcode-project use-profiles

      - name: Export IPA
        script: |
          echo "Checking archive exists..."
          ls -la "$CM_BUILD_DIR/build/LiDARScanner.xcarchive" || echo "Archive not found!"

          echo "Exporting IPA..."
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/LiDARScanner.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ipa" \
            -exportOptionsPlist ~/export_options.plist \
            -allowProvisioningUpdates

          echo "Checking IPA created..."
          ls -la "$CM_BUILD_DIR/build/ipa/" || echo "IPA folder not found!"

      - name: Get version info
        script: |
          # Extract version and build number
          MARKETING_VERSION=$(xcodebuild -showBuildSettings -project LiDARScanner.xcodeproj -scheme "$XCODE_SCHEME" | grep MARKETING_VERSION | tr -d ' ' | cut -d= -f2)
          BUILD_NUMBER=$(xcodebuild -showBuildSettings -project LiDARScanner.xcodeproj -scheme "$XCODE_SCHEME" | grep CURRENT_PROJECT_VERSION | tr -d ' ' | cut -d= -f2)
          echo "Version: $MARKETING_VERSION, Build: $BUILD_NUMBER"
          echo "MARKETING_VERSION=$MARKETING_VERSION" >> $CM_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV

      - name: Upload to Diawi
        script: |
          IPA_PATH=$(find "$CM_BUILD_DIR/build/ipa" -name "*.ipa" | head -1)
          echo "Uploading $IPA_PATH to Diawi..."

          # Upload to Diawi
          UPLOAD_RESPONSE=$(curl -s -X POST "https://upload.diawi.com/" \
            -F "token=$DIAWI_TOKEN" \
            -F "file=@$IPA_PATH" \
            -F "find_by_udid=0" \
            -F "callback_emails=$DIAWI_EMAIL")

          JOB_ID=$(echo $UPLOAD_RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin).get('job', ''))")
          echo "Job ID: $JOB_ID"

          # Wait for processing and get download URL
          sleep 10
          for i in {1..30}; do
            STATUS_RESPONSE=$(curl -s "https://upload.diawi.com/status?token=$DIAWI_TOKEN&job=$JOB_ID")
            STATUS=$(echo $STATUS_RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin).get('status', 0))")

            if [ "$STATUS" = "2000" ]; then
              DIAWI_HASH=$(echo $STATUS_RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin).get('hash', ''))")
              DIAWI_URL="https://i.diawi.com/$DIAWI_HASH"
              echo "Diawi URL: $DIAWI_URL"
              echo "DIAWI_URL=$DIAWI_URL" >> $CM_ENV
              break
            elif [ "$STATUS" = "4000" ]; then
              echo "Diawi upload failed"
              exit 1
            fi
            sleep 5
          done

      - name: Update version.json
        script: |
          # Default repo if not specified
          REPO="${VERSION_JSON_REPO:-mberoz420/LiDARScanner}"

          # Create version.json for in-app update checking
          cat > version.json << EOF
          {
            "latest_version": "$MARKETING_VERSION",
            "build_number": $BUILD_NUMBER,
            "diawi_url": "$DIAWI_URL",
            "release_notes": "New build available. Auto-published from Codemagic.",
            "required": false
          }
          EOF

          echo "Generated version.json:"
          cat version.json
          echo ""
          echo "DIAWI_URL = $DIAWI_URL"

          # Upload to GitHub
          if [ -n "$GITHUB_TOKEN" ]; then
            echo "Uploading version.json to GitHub ($REPO)..."

            # Base64 encode the content
            CONTENT_BASE64=$(base64 -i version.json | tr -d '\n')

            # Get current file SHA if exists
            SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/contents/version.json" \
              | python3 -c "import sys, json; print(json.load(sys.stdin).get('sha', ''))" 2>/dev/null || echo "")

            # Prepare update payload
            if [ -n "$SHA" ]; then
              PAYLOAD="{\"message\":\"Update version.json to $MARKETING_VERSION ($BUILD_NUMBER)\",\"content\":\"$CONTENT_BASE64\",\"sha\":\"$SHA\"}"
            else
              PAYLOAD="{\"message\":\"Add version.json for $MARKETING_VERSION ($BUILD_NUMBER)\",\"content\":\"$CONTENT_BASE64\"}"
            fi

            # Update file via GitHub API
            RESPONSE=$(curl -s -X PUT -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://api.github.com/repos/$REPO/contents/version.json")

            echo "GitHub API response:"
            echo "$RESPONSE" | head -20
            echo ""
            echo "version.json uploaded to: https://raw.githubusercontent.com/$REPO/master/version.json"
          else
            echo "WARNING: GITHUB_TOKEN not set - version.json not uploaded"
            echo "Set GITHUB_TOKEN in Codemagic environment variables"
          fi

    artifacts:
      - build/ipa/*.ipa
      - version.json
      - LiDARScanner/ML/IndoorSegmentation.mlpackage

    publishing:
      email:
        recipients:
          - mberoz61@gmail.com
        notify:
          success: true
          failure: true

  # App Store / TestFlight workflow
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    environment:
      vars:
        XCODE_SCHEME: "LiDARScanner"
        BUNDLE_ID: "com.lidarscanner.LiDarScanner"
        TEAM_ID: "J4FK2D7585"
      groups:
        - App_Store
      xcode: latest

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Set up signing
        script: |
          keychain initialize

          # Save API key to file and clean up whitespace
          mkdir -p ~/.private_keys
          printf '%s\n' "$APP_STORE_CONNECT_PRIVATE_KEY" | tr -d '\r' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//' > ~/.private_keys/AuthKey.p8

          # Use stored certificate key (consistent across builds)
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > ~/.private_keys/cert_key.pem

          # Fetch signing files for App Store
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@file:$HOME/.private_keys/AuthKey.p8" \
            --certificate-key "@file:$HOME/.private_keys/cert_key.pem" \
            --create

          keychain add-certificates
          xcode-project use-profiles

      - name: Increment build number
        script: |
          BUILD_NUMBER=$(($(date +%s)/60))
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all $BUILD_NUMBER || true

      - name: Build Core ML model
        script: |
          echo "Converting PyTorch model to Core ML..."
          cd ML/pretrained || exit 0
          if [ -f "IndoorSegmentation.pt" ]; then
            pip3 install torch coremltools numpy || echo "Warning: pip install failed"
            python3 convert_on_mac.py || echo "Warning: Core ML conversion failed"
            if [ -d "IndoorSegmentation.mlpackage" ]; then
              mkdir -p ../../LiDARScanner/ML
              cp -r IndoorSegmentation.mlpackage ../../LiDARScanner/ML/
              echo "Core ML model created and copied to LiDARScanner/ML/"
            fi
          else
            echo "No PyTorch checkpoint found, skipping Core ML conversion"
          fi
          # Always succeed - ML model is optional
          exit 0

      - name: Build archive
        script: |
          mkdir -p build
          xcodebuild archive \
            -project "LiDARScanner.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/LiDARScanner.xcarchive" \
            -destination "generic/platform=iOS" \
            | xcpretty

      # Note: export options are auto-generated by xcode-project use-profiles

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/LiDARScanner.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ipa" \
            -exportOptionsPlist ~/export_options.plist \
            | xcpretty

      - name: Get version info
        script: |
          MARKETING_VERSION=$(xcodebuild -showBuildSettings -project LiDARScanner.xcodeproj -scheme "$XCODE_SCHEME" | grep MARKETING_VERSION | tr -d ' ' | cut -d= -f2)
          BUILD_NUMBER=$(xcodebuild -showBuildSettings -project LiDARScanner.xcodeproj -scheme "$XCODE_SCHEME" | grep CURRENT_PROJECT_VERSION | tr -d ' ' | cut -d= -f2)
          echo "Version: $MARKETING_VERSION, Build: $BUILD_NUMBER"
          echo "MARKETING_VERSION=$MARKETING_VERSION" >> $CM_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV

      - name: Update version.json for TestFlight
        script: |
          # Create version.json pointing to TestFlight
          cat > version.json << EOF
          {
            "latest_version": "$MARKETING_VERSION",
            "build_number": $BUILD_NUMBER,
            "diawi_url": null,
            "testflight": true,
            "release_notes": "New TestFlight build available!",
            "required": false
          }
          EOF

          if [ -n "$GITHUB_TOKEN" ] && [ -n "$VERSION_JSON_REPO" ]; then
            CONTENT_BASE64=$(base64 -i version.json | tr -d '\n')
            SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$VERSION_JSON_REPO/contents/version.json" \
              | python3 -c "import sys, json; print(json.load(sys.stdin).get('sha', ''))" 2>/dev/null || echo "")

            if [ -n "$SHA" ]; then
              PAYLOAD="{\"message\":\"Update version.json to $MARKETING_VERSION ($BUILD_NUMBER) - TestFlight\",\"content\":\"$CONTENT_BASE64\",\"sha\":\"$SHA\"}"
            else
              PAYLOAD="{\"message\":\"Add version.json for $MARKETING_VERSION ($BUILD_NUMBER)\",\"content\":\"$CONTENT_BASE64\"}"
            fi

            curl -s -X PUT -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://api.github.com/repos/$VERSION_JSON_REPO/contents/version.json"
          fi

    artifacts:
      - build/ipa/*.ipa
      - build/LiDARScanner.xcarchive
      - version.json
      - LiDARScanner/ML/IndoorSegmentation.mlpackage

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - mberoz61@gmail.com
        notify:
          success: true
          failure: true
