name: Build Core ML Model

on:
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - 'ML/pretrained/IndoorSegmentation.pt'
      - 'ML/pretrained/convert_on_mac.py'
      - 'ML/pretrained/export_model.py'

jobs:
  convert-to-coreml:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision coremltools numpy

      - name: Convert to Core ML
        working-directory: ML/pretrained
        run: |
          python convert_on_mac.py
          ls -la

      - name: Copy model to Xcode project
        run: |
          mkdir -p LiDARScanner/ML
          cp -r ML/pretrained/IndoorSegmentation.mlpackage LiDARScanner/ML/

      - name: Commit Core ML model
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add LiDARScanner/ML/IndoorSegmentation.mlpackage
          git diff --staged --quiet || git commit -m "Auto-generate Core ML model from PyTorch checkpoint

          Generated by GitHub Actions on macOS runner.
          Source: ML/pretrained/IndoorSegmentation.pt"
          git push

      - name: Upload Core ML Model as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IndoorSegmentation-CoreML
          path: LiDARScanner/ML/IndoorSegmentation.mlpackage
          retention-days: 30
